# 需要仓库管理员设置的 Secrets：
# - DOCKERHUB_USERNAME：Docker Hub 用户名
# - DOCKERHUB_TOKEN：Docker Hub Access Token
# - DOCKERHUB_REPO：Docker Hub 仓库名（可选，默认 xxtcloudcontrol）
# - GHCR_REPO：GHCR 仓库名（可选，默认 xxtcloudcontrol）
# - PUBLIC_UPDATE_BASE_URL：R2 自定义公网域名根地址（固定为 https://xxtccc-packages.xxtouch.app）
# - R2_ACCOUNT_ID：Cloudflare R2 Account ID
# - R2_ACCESS_KEY_ID：Cloudflare R2 Access Key ID
# - R2_SECRET_ACCESS_KEY：Cloudflare R2 Secret Access Key
# - R2_BUCKET：Cloudflare R2 Bucket 名称（固定为 xxtccc-packages）

name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅构建与打包，不登录/推送镜像、不创建 GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_notes:
        description: "本次发布更新日志（可选，支持多行；会追加在自动生成 Release Notes 前）"
        required: false
        type: string

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ inputs.dry_run != 'true' }}
        uses: docker/login-action@v3
        with:
          # 来自仓库 Secrets
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: ${{ inputs.dry_run != 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # GITHUB_TOKEN 为 Actions 自动注入（需 packages: write 权限）
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u '+%Y%m%d%H%M')"
          VERSION="v$(date -u '+%Y%m%d%H%M')"
          COMMIT="$(git rev-parse --short HEAD)"
          {
            echo "BUILD_TIME=$BUILD_TIME"
            echo "VERSION=$VERSION"
            echo "COMMIT=$COMMIT"
          } >> "$GITHUB_ENV"

      - name: Generate icons from SVG
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          chmod +x generate-icons.sh
          ./generate-icons.sh

      - name: Build frontend
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Build and package releases
        env:
          PUBLIC_UPDATE_BASE_URL: ${{ secrets.PUBLIC_UPDATE_BASE_URL }}
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          RELEASE_DIR="$ROOT/release"
          FRONTEND_DIST="$ROOT/frontend/dist"

          if [ ! -d "$FRONTEND_DIST" ]; then
            echo "Error: frontend build output not found at $FRONTEND_DIST" >&2
            exit 1
          fi

          DEFAULT_UPDATE_MANIFEST_URLS="https://github.com/$GITHUB_REPOSITORY/releases/latest/download/update-manifest.json"
          if [ -n "${PUBLIC_UPDATE_BASE_URL:-}" ]; then
            DEFAULT_UPDATE_MANIFEST_URLS="${PUBLIC_UPDATE_BASE_URL%/}/releases/latest/download/update-manifest.json,${DEFAULT_UPDATE_MANIFEST_URLS}"
          fi

          LDFLAGS="-X 'main.BuildTime=$BUILD_TIME' -X 'main.Version=$VERSION' -X 'main.Commit=$COMMIT' -X 'main.DefaultUpdateManifestURLsCSV=$DEFAULT_UPDATE_MANIFEST_URLS'"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"

            BIN="xxtcloudserver-$GOOS-$GOARCH"
            if [ "$GOOS" = "windows" ]; then
              BIN="${BIN}.exe"
            fi

            echo "Building $GOOS/$GOARCH..."
            (cd "$ROOT/server" && env CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "$LDFLAGS" -o "$RELEASE_DIR/$BIN" .)

            PACKAGE_DIR="$RELEASE_DIR/.package/$GOOS-$GOARCH"
            PACKAGE_ROOT="$PACKAGE_DIR/XXTCloudControl"
            mkdir -p "$PACKAGE_ROOT/frontend"
            cp "$RELEASE_DIR/$BIN" "$PACKAGE_ROOT/"
            cp -R "$FRONTEND_DIST"/. "$PACKAGE_ROOT/frontend/"

            ZIP_NAME="XXTCloudControl-$VERSION-$GOOS-$GOARCH.zip"
            ZIP_PATH="$RELEASE_DIR/$ZIP_NAME"
            (cd "$PACKAGE_DIR" && zip -r "$ZIP_PATH" "XXTCloudControl" >/dev/null)
          done

          ls -la "$RELEASE_DIR"/*.zip

      - name: Build docker images (amd64/arm64)
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          RELEASE_DIR="$ROOT/release"
          FRONTEND_DIST="$ROOT/frontend/dist"

          for arch in amd64 arm64; do
            OUTPUT_TAR="$RELEASE_DIR/XXTCloudControl-docker-$VERSION-linux-$arch.tar"
            DOCKER_BUILD_DIR="$RELEASE_DIR/.docker-$arch"

            mkdir -p "$DOCKER_BUILD_DIR"
            cp "$RELEASE_DIR/xxtcloudserver-linux-$arch" "$DOCKER_BUILD_DIR/"
            cp -R "$FRONTEND_DIST" "$DOCKER_BUILD_DIR/frontend"
            cp Dockerfile.release "$DOCKER_BUILD_DIR/Dockerfile"

            docker buildx build \
              --platform "linux/$arch" \
              --build-arg TARGETARCH="$arch" \
              -t "xxtcloudcontrol:$VERSION-$arch" \
              --output "type=docker,dest=$OUTPUT_TAR" \
              "$DOCKER_BUILD_DIR"

            rm -rf "$DOCKER_BUILD_DIR"
          done

          ls -la "$RELEASE_DIR"/*.tar

      - name: Generate update metadata (manifest/checksums/latest)
        env:
          PUBLIC_UPDATE_BASE_URL: ${{ secrets.PUBLIC_UPDATE_BASE_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          RELEASE_DIR="$ROOT/release"
          CHECKSUMS_PATH="$RELEASE_DIR/checksums.txt"
          MANIFEST_PATH="$RELEASE_DIR/update-manifest.json"
          LATEST_PATH="$RELEASE_DIR/latest.txt"
          REPO="$GITHUB_REPOSITORY"
          TAG="$VERSION"
          GITHUB_VERSION_URL="https://github.com/$REPO/releases/download/$TAG"
          GITHUB_LATEST_URL="https://github.com/$REPO/releases/latest/download"
          UPDATE_BASE_URL=""
          if [ "${DRY_RUN}" != "true" ]; then
            : "${PUBLIC_UPDATE_BASE_URL:?PUBLIC_UPDATE_BASE_URL is required for non-dry-run releases}"
            UPDATE_BASE_URL="${PUBLIC_UPDATE_BASE_URL%/}"
          elif [ -n "${PUBLIC_UPDATE_BASE_URL:-}" ]; then
            UPDATE_BASE_URL="${PUBLIC_UPDATE_BASE_URL%/}"
          fi

          DOWNLOAD_BASE_URL="$GITHUB_VERSION_URL"
          LATEST_BASE_URL="$GITHUB_LATEST_URL"
          USE_R2_PRIMARY="false"
          if [ -n "$UPDATE_BASE_URL" ]; then
            DOWNLOAD_BASE_URL="$UPDATE_BASE_URL/releases/download/$TAG"
            LATEST_BASE_URL="$UPDATE_BASE_URL/releases/latest/download"
            USE_R2_PRIMARY="true"
          fi

          PUBLISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          LINUX_AMD64_ZIP="XXTCloudControl-$TAG-linux-amd64.zip"
          LINUX_ARM64_ZIP="XXTCloudControl-$TAG-linux-arm64.zip"
          WINDOWS_AMD64_ZIP="XXTCloudControl-$TAG-windows-amd64.zip"
          WINDOWS_ARM64_ZIP="XXTCloudControl-$TAG-windows-arm64.zip"
          DARWIN_AMD64_ZIP="XXTCloudControl-$TAG-darwin-amd64.zip"
          DARWIN_ARM64_ZIP="XXTCloudControl-$TAG-darwin-arm64.zip"
          DOCKER_AMD64_TAR="XXTCloudControl-docker-$TAG-linux-amd64.tar"
          DOCKER_ARM64_TAR="XXTCloudControl-docker-$TAG-linux-arm64.tar"

          cd "$RELEASE_DIR"
          sha256sum \
            "$LINUX_AMD64_ZIP" \
            "$LINUX_ARM64_ZIP" \
            "$WINDOWS_AMD64_ZIP" \
            "$WINDOWS_ARM64_ZIP" \
            "$DARWIN_AMD64_ZIP" \
            "$DARWIN_ARM64_ZIP" \
            "$DOCKER_AMD64_TAR" \
            "$DOCKER_ARM64_TAR" \
            > "$CHECKSUMS_PATH"

          checksum_for() {
            local file="$1"
            awk -v f="$file" '$2==f {print $1}' "$CHECKSUMS_PATH"
          }

          fallback_or_empty() {
            local file="$1"
            if [ "$USE_R2_PRIMARY" = "true" ]; then
              printf '%s' "$GITHUB_VERSION_URL/$file"
            else
              printf '%s' ""
            fi
          }

          cat > "$MANIFEST_PATH" <<EOF
          {
            "version": "$TAG",
            "channel": "stable",
            "buildTime": "$BUILD_TIME",
            "commit": "$COMMIT",
            "publishedAt": "$PUBLISHED_AT",
            "checksumsUrl": "$DOWNLOAD_BASE_URL/checksums.txt",
            "latestChecksumsUrl": "$LATEST_BASE_URL/checksums.txt",
            "assets": [
              {
                "os": "linux",
                "arch": "amd64",
                "name": "$LINUX_AMD64_ZIP",
                "url": "$DOWNLOAD_BASE_URL/$LINUX_AMD64_ZIP",
                "fallbackUrl": "$(fallback_or_empty "$LINUX_AMD64_ZIP")",
                "latestUrl": "$GITHUB_LATEST_URL/$LINUX_AMD64_ZIP",
                "sha256": "$(checksum_for "$LINUX_AMD64_ZIP")"
              },
              {
                "os": "linux",
                "arch": "arm64",
                "name": "$LINUX_ARM64_ZIP",
                "url": "$DOWNLOAD_BASE_URL/$LINUX_ARM64_ZIP",
                "fallbackUrl": "$(fallback_or_empty "$LINUX_ARM64_ZIP")",
                "latestUrl": "$GITHUB_LATEST_URL/$LINUX_ARM64_ZIP",
                "sha256": "$(checksum_for "$LINUX_ARM64_ZIP")"
              },
              {
                "os": "windows",
                "arch": "amd64",
                "name": "$WINDOWS_AMD64_ZIP",
                "url": "$DOWNLOAD_BASE_URL/$WINDOWS_AMD64_ZIP",
                "fallbackUrl": "$(fallback_or_empty "$WINDOWS_AMD64_ZIP")",
                "latestUrl": "$GITHUB_LATEST_URL/$WINDOWS_AMD64_ZIP",
                "sha256": "$(checksum_for "$WINDOWS_AMD64_ZIP")"
              },
              {
                "os": "windows",
                "arch": "arm64",
                "name": "$WINDOWS_ARM64_ZIP",
                "url": "$DOWNLOAD_BASE_URL/$WINDOWS_ARM64_ZIP",
                "fallbackUrl": "$(fallback_or_empty "$WINDOWS_ARM64_ZIP")",
                "latestUrl": "$GITHUB_LATEST_URL/$WINDOWS_ARM64_ZIP",
                "sha256": "$(checksum_for "$WINDOWS_ARM64_ZIP")"
              },
              {
                "os": "darwin",
                "arch": "amd64",
                "name": "$DARWIN_AMD64_ZIP",
                "url": "$DOWNLOAD_BASE_URL/$DARWIN_AMD64_ZIP",
                "fallbackUrl": "$(fallback_or_empty "$DARWIN_AMD64_ZIP")",
                "latestUrl": "$GITHUB_LATEST_URL/$DARWIN_AMD64_ZIP",
                "sha256": "$(checksum_for "$DARWIN_AMD64_ZIP")"
              },
              {
                "os": "darwin",
                "arch": "arm64",
                "name": "$DARWIN_ARM64_ZIP",
                "url": "$DOWNLOAD_BASE_URL/$DARWIN_ARM64_ZIP",
                "fallbackUrl": "$(fallback_or_empty "$DARWIN_ARM64_ZIP")",
                "latestUrl": "$GITHUB_LATEST_URL/$DARWIN_ARM64_ZIP",
                "sha256": "$(checksum_for "$DARWIN_ARM64_ZIP")"
              }
            ],
            "dockerAssets": [
              {
                "os": "linux",
                "arch": "amd64",
                "name": "$DOCKER_AMD64_TAR",
                "url": "$DOWNLOAD_BASE_URL/$DOCKER_AMD64_TAR",
                "latestUrl": "$GITHUB_LATEST_URL/$DOCKER_AMD64_TAR",
                "sha256": "$(checksum_for "$DOCKER_AMD64_TAR")"
              },
              {
                "os": "linux",
                "arch": "arm64",
                "name": "$DOCKER_ARM64_TAR",
                "url": "$DOWNLOAD_BASE_URL/$DOCKER_ARM64_TAR",
                "latestUrl": "$GITHUB_LATEST_URL/$DOCKER_ARM64_TAR",
                "sha256": "$(checksum_for "$DOCKER_ARM64_TAR")"
              }
            ]
          }
          EOF

          cat > "$LATEST_PATH" <<EOF
          version=$TAG
          published_at=$PUBLISHED_AT
          manifest_url=$LATEST_BASE_URL/update-manifest.json
          checksums_url=$LATEST_BASE_URL/checksums.txt
          EOF

          ls -la "$RELEASE_DIR"/update-manifest.json "$RELEASE_DIR"/checksums.txt "$RELEASE_DIR"/latest.txt

      - name: Validate update metadata
        env:
          PUBLIC_UPDATE_BASE_URL: ${{ secrets.PUBLIC_UPDATE_BASE_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          RELEASE_DIR="$ROOT/release"
          cd "$RELEASE_DIR"

          if [ "${DRY_RUN}" != "true" ]; then
            R2_PREFIX="${PUBLIC_UPDATE_BASE_URL%/}/releases/download/${VERSION}/"
            R2_LATEST_PREFIX="${PUBLIC_UPDATE_BASE_URL%/}/releases/latest/download/"
            GH_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/"

            jq -e --arg r2 "$R2_PREFIX" '.checksumsUrl | startswith($r2)' update-manifest.json >/dev/null
            jq -e --arg r2Latest "$R2_LATEST_PREFIX" '.latestChecksumsUrl | startswith($r2Latest)' update-manifest.json >/dev/null
            jq -e \
              --arg r2 "$R2_PREFIX" \
              --arg gh "$GH_PREFIX" \
              '.assets | length >= 6 and all(.[]; (.url | startswith($r2)) and (.fallbackUrl | startswith($gh)))' \
              update-manifest.json >/dev/null
          else
            jq -e '.assets | length >= 6 and all(.[]; (.url | length) > 0)' update-manifest.json >/dev/null
          fi

      - name: Validate R2 publish config
        if: ${{ inputs.dry_run != 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          : "${R2_ACCOUNT_ID:?R2_ACCOUNT_ID is required}"
          : "${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}"
          : "${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}"
          : "${R2_BUCKET:?R2_BUCKET is required}"

      - name: Push docker images to Docker Hub + GHCR (amd64/arm64)
        if: ${{ inputs.dry_run != 'true' }}
        env:
          # 来自仓库 Secrets
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
          GHCR_REPO: ${{ secrets.GHCR_REPO }}
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          RELEASE_DIR="$ROOT/release"
          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Error: DOCKERHUB_USERNAME is not set." >&2
            exit 1
          fi

          IMAGE_REPO="${DOCKERHUB_REPO:-xxtcloudcontrol}"
          IMAGE_DH="${DOCKERHUB_USERNAME}/${IMAGE_REPO}"
          GHCR_REPO_NAME="${GHCR_REPO:-xxtcloudcontrol}"
          IMAGE_GH="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${GHCR_REPO_NAME}"
          DOCKER_IMAGE_NAME="xxtcloudcontrol"

          # Reuse built tar artifacts to avoid rebuilding the same images again.
          for arch in amd64 arm64; do
            TAR_PATH="$RELEASE_DIR/XXTCloudControl-docker-$VERSION-linux-$arch.tar"
            if [ ! -f "$TAR_PATH" ]; then
              echo "Error: docker artifact not found: $TAR_PATH" >&2
              exit 1
            fi

            docker load -i "$TAR_PATH"

            docker tag "$DOCKER_IMAGE_NAME:$VERSION-$arch" "$IMAGE_DH:$VERSION-$arch"
            docker tag "$DOCKER_IMAGE_NAME:$VERSION-$arch" "$IMAGE_GH:$VERSION-$arch"

            docker push "$IMAGE_DH:$VERSION-$arch"
            docker push "$IMAGE_GH:$VERSION-$arch"
          done

          docker manifest rm "$IMAGE_DH:$VERSION" >/dev/null 2>&1 || true
          docker manifest create "$IMAGE_DH:$VERSION" \
            "$IMAGE_DH:$VERSION-amd64" \
            "$IMAGE_DH:$VERSION-arm64"
          docker manifest push "$IMAGE_DH:$VERSION"

          docker manifest rm "$IMAGE_DH:latest" >/dev/null 2>&1 || true
          docker manifest create "$IMAGE_DH:latest" \
            "$IMAGE_DH:$VERSION-amd64" \
            "$IMAGE_DH:$VERSION-arm64"
          docker manifest push "$IMAGE_DH:latest"

          docker manifest rm "$IMAGE_GH:$VERSION" >/dev/null 2>&1 || true
          docker manifest create "$IMAGE_GH:$VERSION" \
            "$IMAGE_GH:$VERSION-amd64" \
            "$IMAGE_GH:$VERSION-arm64"
          docker manifest push "$IMAGE_GH:$VERSION"

          docker manifest rm "$IMAGE_GH:latest" >/dev/null 2>&1 || true
          docker manifest create "$IMAGE_GH:latest" \
            "$IMAGE_GH:$VERSION-amd64" \
            "$IMAGE_GH:$VERSION-arm64"
          docker manifest push "$IMAGE_GH:latest"

      - name: Upload Public Artifacts to R2
        if: ${{ inputs.dry_run != 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          : "${R2_ACCOUNT_ID:?R2_ACCOUNT_ID is required}"
          : "${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}"
          : "${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}"
          : "${R2_BUCKET:?R2_BUCKET is required}"

          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_REGION=auto
          export AWS_DEFAULT_REGION=auto
          export AWS_EC2_METADATA_DISABLED=true

          ROOT="$GITHUB_WORKSPACE"
          RELEASE_DIR="$ROOT/release"
          cd "$RELEASE_DIR"

          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          content_type_for() {
            case "$1" in
              *.json) printf '%s' 'application/json' ;;
              *.txt) printf '%s' 'text/plain; charset=utf-8' ;;
              *.zip) printf '%s' 'application/zip' ;;
              *.tar) printf '%s' 'application/x-tar' ;;
              *) printf '%s' 'application/octet-stream' ;;
            esac
          }

          upload_object() {
            local file="$1"
            local key="$2"
            local cache_control="$3"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${key}" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto \
              --only-show-errors \
              --no-progress \
              --content-type "$(content_type_for "$file")" \
              --cache-control "$cache_control"
          }

          public_artifacts=(./*.zip ./*.tar)
          immutable_cache='public, max-age=31536000, immutable'
          latest_cache='no-cache, must-revalidate'

          for f in "${public_artifacts[@]}" ./update-manifest.json ./checksums.txt ./latest.txt; do
            upload_object "$f" "releases/download/${VERSION}/$(basename "$f")" "$immutable_cache"
          done

          upload_object ./update-manifest.json "releases/latest/download/update-manifest.json" "$latest_cache"
          upload_object ./checksums.txt "releases/latest/download/checksums.txt" "$latest_cache"
          upload_object ./latest.txt "releases/latest/download/latest.txt" "$latest_cache"

      - name: Create GitHub Release (auto notes)
        if: ${{ inputs.dry_run != 'true' && inputs.release_notes == '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            release/XXTCloudControl-*.zip
            release/XXTCloudControl-docker-*.tar
            release/update-manifest.json
            release/checksums.txt
            release/latest.txt
          fail_on_unmatched_files: true

      - name: Create GitHub Release (custom notes)
        if: ${{ inputs.dry_run != 'true' && inputs.release_notes != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ inputs.release_notes }}
          generate_release_notes: true
          files: |
            release/XXTCloudControl-*.zip
            release/XXTCloudControl-docker-*.tar
            release/update-manifest.json
            release/checksums.txt
            release/latest.txt
          fail_on_unmatched_files: true

      - name: Trigger Pages workflow
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'release-pages',
              client_payload: {
                release_tag: process.env.VERSION
              }
            });
            core.info(`Triggered repository_dispatch release-pages for ${process.env.VERSION}`);
